id: WAF-SOV-050
title: "Key Ownership & Management Defined"
pillar: "sovereign"
status: "active"
severity: "critical"
category: "key-sovereignty"
type: ['security', 'governance']
tags: ['keys', 'kms', 'hsm', 'encryption', 'cmk', 'byok', 'hyok', 'key-rotation']

description: >
  For all data classes, the key ownership model MUST be explicitly defined and technically
  enforced: Provider-Managed Keys (PMK), Customer-Managed Keys (CMK), Bring Your Own Key
  (BYOK), or Hold Your Own Key (HYOK). Key rotation and deletion MUST be governed by
  documented procedures. All data at rest MUST be encrypted; encryption with default
  provider-managed keys requires explicit approval for sensitive data classes.

rationale: >
  If a cloud provider controls the encryption keys, they theoretically retain the ability
  to decrypt data—regardless of the data's geographic location. True sovereignty over data
  requires sovereignty over the keys that protect it. CMK/BYOK ensures that even if a
  provider is legally compelled to hand over data, the data remains cryptographically
  inaccessible without the customer-held key material. Key rotation and secure deletion
  are critical for limiting the blast radius of key compromise.

threat:
  - "Provider-controlled keys allowing provider or law enforcement access to customer data"
  - "Unencrypted data at rest in storage services using default provider encryption"
  - "Key material in source code, environment variables, or unsecured secret stores"
  - "Disabled key rotation increasing impact radius of key compromise"
  - "No key deletion policy allowing stale key material to persist after data deletion"

regulatory_mapping:
  - framework: "GDPR"
    controls:
      - "Art. 32 – Security of processing (encryption as a technical measure)"
      - "Art. 17 – Right to erasure (cryptographic erasure via key deletion)"
  - framework: "BSI C5:2020"
    controls:
      - "CRY-01 – Cryptography policy"
      - "CRY-02 – Key management"
  - framework: "EUCS (ENISA)"
    controls:
      - "CRY-01 – Encryption at rest"
      - "CRY-03 – Key management"
      - "SOV-03 – Customer key control"
  - framework: "ISO 27001:2022"
    controls:
      - "A.8.24 – Use of cryptography"
      - "A.8.25 – Secure development life cycle"
  - framework: "GAIA-X"
    controls:
      - "Sovereign Cloud – Cryptographic self-determination"

implementation_guidance:
  - "Define the key ownership model per data class in the data residency policy."
  - "For PII, health, and financial data: require CMK or BYOK; explicitly deny default PMK."
  - "Use aws_kms_key / azurerm_key_vault_key / google_kms_crypto_key with enable_key_rotation = true."
  - "Store BYOK/HYOK key material in an HSM outside the cloud provider's control (e.g., Thales, Utimaco)."
  - "Set deletion_window_in_days to enforce a mandatory review period before key destruction."
  - "Never store key material in Terraform state, environment variables, or application code."
  - "Use IAM key policies to restrict which services and principals can use each key."
  - "Implement key access logging (CloudTrail for KMS) and alert on unusual decryption patterns."

maturity_levels:
  level_1:
    description: "Encryption enabled with provider-managed keys"
    criteria:
      - "Data at rest is encrypted"
      - "Provider-managed keys used by default"
  level_2:
    description: "CMK deployed for sensitive data classes"
    criteria:
      - "KMS CMKs deployed for PII, financial, and health data"
      - "Key rotation enabled"
  level_3:
    description: "Full key sovereignty posture"
    criteria:
      - "No default PMK for sensitive data classes"
      - "Key policies restrict access to minimum necessary principals"
      - "Key deletion policy defined and tested"
  level_4:
    description: "BYOK/HYOK for critical data, HSM-backed"
    criteria:
      - "Critical data classes use BYOK or HYOK with external HSM"
      - "Key material never exposed to cloud provider"
      - "Key access monitoring with anomaly detection"
  level_5:
    description: "Automated key governance with cryptographic erasure capability"
    criteria:
      - "Cryptographic erasure tested for GDPR Art. 17 compliance"
      - "Key lifecycle fully automated and auditable"
      - "HSM key ceremonies documented and audited annually"

evidence:
  required:
    - kind: "iac"
      description: "KMS key resources with enable_key_rotation = true and explicit deletion_window settings."
    - kind: "iac"
      description: "Encryption configurations for all data resources (S3, RDS, EBS, etc.) referencing CMK ARNs."
  optional:
    - kind: "config"
      description: "KMS key policy export showing restricted principal access."
    - kind: "process"
      description: "Key rotation schedule and deletion procedure documentation."
    - kind: "logs"
      description: "CloudTrail/KMS access logs showing key usage patterns."

checks:
  - id: "waf-sov-050.tf.aws.kms-key-rotation-enabled"
    engine: "terraform"
    provider: "aws"
    automated: true
    severity: "critical"
    title: "AWS KMS CMKs must have automatic key rotation enabled"
    description: >
      All customer-managed KMS keys must have enable_key_rotation = true to ensure
      key material is automatically rotated annually, limiting the impact of key compromise.
    scope:
      block_type: "resource"
      resource_types:
        - "aws_kms_key"
    assertions:
      - attribute: "enable_key_rotation"
        op: "is_true"
        message: "KMS key must have enable_key_rotation = true."
    on_fail: "violation"
    remediation: >
      Set enable_key_rotation = true on all aws_kms_key resources.
    example:
      compliant: |
        resource "aws_kms_key" "sovereign" {
          description             = "Sovereign data encryption key"
          enable_key_rotation     = true
          deletion_window_in_days = 30
          policy                  = data.aws_iam_policy_document.kms_policy.json
        }
      non_compliant: |
        resource "aws_kms_key" "data" {
          description = "Data key"
          # enable_key_rotation defaults to false
        }

  - id: "waf-sov-050.tf.aws.kms-key-deletion-window"
    engine: "terraform"
    provider: "aws"
    automated: true
    severity: "medium"
    title: "KMS key deletion window must be explicitly set (>= 14 days)"
    description: >
      KMS keys must have deletion_window_in_days explicitly set to at least 14 days
      to prevent accidental key destruction and allow time for review and cancellation.
    scope:
      block_type: "resource"
      resource_types:
        - "aws_kms_key"
    assertions:
      - attribute: "deletion_window_in_days"
        op: "attribute_exists"
        message: "KMS key is missing explicit deletion_window_in_days."
      - attribute: "deletion_window_in_days"
        op: "greater_than_or_equal"
        expected: 14
        message: "KMS key deletion_window_in_days must be >= 14 days."
    on_fail: "violation"
    remediation: >
      Set deletion_window_in_days >= 14 on all KMS keys.
    example:
      compliant: |
        resource "aws_kms_key" "sovereign" {
          deletion_window_in_days = 30
        }
      non_compliant: |
        resource "aws_kms_key" "sovereign" {
          deletion_window_in_days = 7  # Too short for safe review
        }

  - id: "waf-sov-050.tf.aws.s3-bucket-kms-encryption"
    engine: "terraform"
    provider: "aws"
    automated: true
    severity: "critical"
    title: "S3 buckets must use KMS (CMK) encryption, not AES256"
    description: >
      S3 buckets containing sovereign data must use aws:kms encryption with a
      customer-managed key, not the default AES256 (SSE-S3) which uses
      provider-managed keys.
    scope:
      block_type: "resource"
      resource_types:
        - "aws_s3_bucket_server_side_encryption_configuration"
    assertions:
      - attribute: "rule.apply_server_side_encryption_by_default.sse_algorithm"
        op: "equals"
        expected: "aws:kms"
        message: "S3 bucket must use 'aws:kms' encryption, not 'AES256' (provider-managed keys)."
      - attribute: "rule.apply_server_side_encryption_by_default.kms_master_key_id"
        op: "attribute_exists"
        message: "S3 KMS encryption must reference a specific CMK, not the default AWS managed key."
    on_fail: "violation"
    remediation: >
      Set sse_algorithm = "aws:kms" and specify kms_master_key_id pointing to a CMK.
    example:
      compliant: |
        resource "aws_s3_bucket_server_side_encryption_configuration" "sovereign" {
          bucket = aws_s3_bucket.data.id
          rule {
            apply_server_side_encryption_by_default {
              sse_algorithm     = "aws:kms"
              kms_master_key_id = aws_kms_key.sovereign.arn
            }
            bucket_key_enabled = true
          }
        }
      non_compliant: |
        resource "aws_s3_bucket_server_side_encryption_configuration" "data" {
          bucket = aws_s3_bucket.data.id
          rule {
            apply_server_side_encryption_by_default {
              sse_algorithm = "AES256"  # Provider-managed key – not sovereign
            }
          }
        }

  - id: "waf-sov-050.tf.aws.ebs-volume-encrypted"
    engine: "terraform"
    provider: "aws"
    automated: true
    severity: "critical"
    title: "EBS volumes must be encrypted"
    description: >
      All EBS volumes must have encrypted = true. This should reference a CMK
      for sovereign workloads rather than using the default AWS managed key.
    scope:
      block_type: "resource"
      resource_types:
        - "aws_ebs_volume"
        - "aws_instance"
    assertions:
      - attribute: "encrypted"
        op: "is_true"
        message: "EBS volume must have encrypted = true."
    on_fail: "violation"
    remediation: >
      Set encrypted = true and optionally kms_key_id = <cmk_arn> on EBS volumes.
    example:
      compliant: |
        resource "aws_ebs_volume" "data" {
          availability_zone = "eu-central-1a"
          size              = 100
          encrypted         = true
          kms_key_id        = aws_kms_key.sovereign.arn
        }
      non_compliant: |
        resource "aws_ebs_volume" "data" {
          availability_zone = "eu-central-1a"
          size              = 100
          # encrypted defaults to false
        }

  - id: "waf-sov-050.tf.aws.rds-storage-encrypted"
    engine: "terraform"
    provider: "aws"
    automated: true
    severity: "critical"
    title: "RDS instances must have storage encryption enabled"
    description: >
      All RDS instances and Aurora clusters must have storage_encrypted = true.
      KMS key ID should reference a CMK for sovereign workloads.
    scope:
      block_type: "resource"
      resource_types:
        - "aws_db_instance"
        - "aws_rds_cluster"
    assertions:
      - attribute: "storage_encrypted"
        op: "is_true"
        message: "RDS storage_encrypted must be true."
    on_fail: "violation"
    remediation: >
      Set storage_encrypted = true and optionally kms_key_id on all RDS resources.
    example:
      compliant: |
        resource "aws_db_instance" "sovereign" {
          storage_encrypted = true
          kms_key_id        = aws_kms_key.rds.arn
        }
      non_compliant: |
        resource "aws_db_instance" "db" {
          # storage_encrypted defaults to false
        }

  - id: "waf-sov-050.tf.azurerm.key-vault-soft-delete"
    engine: "terraform"
    provider: "azurerm"
    automated: true
    severity: "high"
    title: "Azure Key Vault must have soft delete and purge protection enabled"
    description: >
      Azure Key Vaults used for CMK storage must have soft_delete_retention_days >= 7
      and purge_protection_enabled = true to prevent accidental key destruction.
    scope:
      block_type: "resource"
      resource_types:
        - "azurerm_key_vault"
    assertions:
      - attribute: "purge_protection_enabled"
        op: "is_true"
        message: "Azure Key Vault must have purge_protection_enabled = true."
      - attribute: "soft_delete_retention_days"
        op: "greater_than_or_equal"
        expected: 14
        message: "Key Vault soft_delete_retention_days must be >= 14."
    on_fail: "violation"
    remediation: >
      Enable purge_protection_enabled = true and set soft_delete_retention_days >= 14.
    example:
      compliant: |
        resource "azurerm_key_vault" "sovereign" {
          name                       = "kv-sovereign-prod"
          location                   = var.azure_location
          resource_group_name        = azurerm_resource_group.main.name
          sku_name                   = "premium"
          soft_delete_retention_days = 90
          purge_protection_enabled   = true
        }
      non_compliant: |
        resource "azurerm_key_vault" "kv" {
          name     = "kv-prod"
          sku_name = "standard"
          # purge_protection_enabled defaults to false
        }

references:
  narrative: "modules/pillar-sovereign/pages/controls.adoc#WAF-SOV-050"
  best_practice: "modules/pillar-sovereign/pages/best-practices/bp-key-sovereignty.adoc"
  related_controls:
    - "WAF-SOV-010"
    - "WAF-SOV-030"
    - "WAF-SOV-060"
    - "WAF-SOV-090"
