id: WAF-SOV-080
title: "Dependency & Subprocessor Inventory"
pillar: "sovereign"
status: "active"
severity: "medium"
category: "supply-chain"
type: ['governance', 'supply-chain']
tags: ['supply-chain', 'subprocessor', 'dependencies', 'third-party', 'sbom', 'lock-file']

description: >
  An inventory of all dependencies and subprocessors MUST be maintained: managed cloud
  services, third-party SaaS tools, CI/CD platforms, observability providers, and data
  processors. Changes to this inventory MUST be version-controlled, reviewed, and
  approved. Provider version constraints in Terraform MUST be pinned to prevent silent
  upgrades. Module sources MUST reference approved registries with version-locked references.

rationale: >
  Cloud sovereignty cannot be assessed without knowing what third parties process your
  data, from what jurisdiction, and under what legal basis. A Datadog agent shipping
  logs to US servers, a GitHub Actions runner with access to production secrets, or an
  unreviewed Terraform module from an untrusted source can each independently compromise
  the sovereignty posture. Supply chain awareness is the prerequisite to supply chain control.

threat:
  - "Third-party SaaS tool (monitoring, ticketing, CI/CD) processing sovereign data outside approved jurisdiction"
  - "Unpinned Terraform provider version silently upgraded with breaking behavior changes"
  - "Unreviewed Terraform module from unknown author with malicious resource configurations"
  - "Subprocessor added without DPA review violating GDPR Art. 28 requirements"
  - "CI/CD platform (GitHub, GitLab, CircleCI) with access to production credentials not listed as subprocessor"

regulatory_mapping:
  - framework: "GDPR"
    controls:
      - "Art. 28 – Processor"
      - "Art. 30 – Records of processing activities"
      - "Art. 44-46 – Transfers to third countries"
  - framework: "BSI C5:2020"
    controls:
      - "SCA-01 – Supply chain management"
      - "OPS-04 – Data management"
  - framework: "EUCS (ENISA)"
    controls:
      - "SCA-01 – Supply chain"
      - "IAM-04 – Third-party access"
  - framework: "ISO 27001:2022"
    controls:
      - "A.5.19 – Information security in supplier relationships"
      - "A.5.20 – Addressing information security in supplier agreements"
      - "A.5.21 – Managing information security in the ICT supply chain"
  - framework: "SLSA"
    controls:
      - "L2 – Build integrity"
      - "L3 – Source integrity"

implementation_guidance:
  - "Maintain a dependency register (YAML/JSON in git) listing all external services: name, purpose, data processed, hosting region, legal basis."
  - "Pin all Terraform provider versions in required_providers with an exact or tightly bounded constraint (e.g., ~> 5.0, not >= 0.0.0)."
  - "Pin Terraform module versions: use version = 'x.y.z' for registry modules; use git refs for git-sourced modules."
  - "Require a DPA (Data Processing Agreement) for all subprocessors handling personal data; store reference in the dependency register."
  - "Review the subprocessor list quarterly; track changes in a changelog."
  - "Use lock files (terraform.lock.hcl) and commit them to the repository."
  - "For CI/CD pipelines: treat the CI platform itself as a subprocessor if secrets or data flow through it."

maturity_levels:
  level_1:
    description: "No formal inventory, provider versions unpinned"
    criteria:
      - "Some awareness of main dependencies"
      - "No structured documentation"
  level_2:
    description: "Dependency inventory documented, providers pinned"
    criteria:
      - "Dependency register exists (even as spreadsheet)"
      - "Terraform provider versions pinned in required_providers"
      - "Lock file committed to repository"
  level_3:
    description: "Version-controlled inventory with DPA references"
    criteria:
      - "Machine-readable dependency register in git"
      - "Each subprocessor has DPA reference and data-class annotation"
      - "Quarterly review process with documented evidence"
  level_4:
    description: "Automated supply chain monitoring"
    criteria:
      - "Automated alerts on new/changed providers or modules in PRs"
      - "SBOM generated for infrastructure deployments"
      - "Subprocessor changes trigger review workflow"
  level_5:
    description: "Full supply chain attestation pipeline"
    criteria:
      - "SLSA compliance for critical supply chain components"
      - "Automated DPA status verification integrated into deployment gate"
      - "Cryptographic attestation for module provenance"

evidence:
  required:
    - kind: "governance"
      description: "Dependency/subprocessor register (version-controlled, covering all external services with data flows)."
    - kind: "iac"
      description: "Terraform required_providers with pinned version constraints and committed lock file."
  optional:
    - kind: "process"
      description: "Quarterly review records for the subprocessor inventory."
    - kind: "governance"
      description: "DPA agreements reference list for all data-processing subprocessors."

checks:
  - id: "waf-sov-080.tf.any.required-providers-version-pinned"
    engine: "terraform"
    provider: "any"
    automated: true
    severity: "high"
    title: "All required_providers must have version constraints pinned"
    description: >
      Every entry in the terraform required_providers block must specify a version
      constraint. Unpinned providers allow silent upgrades that may change behavior,
      introduce breaking changes, or alter sovereign controls without review.
    scope:
      block_type: "terraform"
      sub_block: "required_providers"
    assertions:
      - attribute: "version"
        op: "attribute_exists_on_all_providers"
        message: "One or more required_providers entries are missing version constraints."
      - attribute: "version"
        op: "not_matches"
        pattern: "^>= 0\\.0\\.0$"
        message: "Provider version constraint is too broad (>= 0.0.0). Use a tightly bounded constraint."
    on_fail: "violation"
    remediation: >
      Add version constraints to all required_providers using the ~> operator for
      compatible version pinning (e.g., ~> 5.0 for AWS provider v5.x).
    example:
      compliant: |
        terraform {
          required_version = ">= 1.6.0"
          required_providers {
            aws = {
              source  = "hashicorp/aws"
              version = "~> 5.40"
            }
            azurerm = {
              source  = "hashicorp/azurerm"
              version = "~> 3.100"
            }
          }
        }
      non_compliant: |
        terraform {
          required_providers {
            aws = {
              source = "hashicorp/aws"
              # No version constraint – any version accepted
            }
          }
        }

  - id: "waf-sov-080.tf.any.required-terraform-version"
    engine: "terraform"
    provider: "any"
    automated: true
    severity: "medium"
    title: "Terraform required_version must be set"
    description: >
      The 'terraform' block must include a required_version constraint to ensure
      reproducible behavior across environments and prevent use of incompatible
      Terraform versions.
    scope:
      block_type: "terraform"
    assertions:
      - attribute: "required_version"
        op: "attribute_exists"
        message: "terraform block is missing required_version constraint."
    on_fail: "violation"
    remediation: >
      Add required_version = ">= 1.x.x" to the terraform configuration block.
    example:
      compliant: |
        terraform {
          required_version = ">= 1.6.0, < 2.0.0"
        }
      non_compliant: |
        terraform {
          # No required_version set
        }

  - id: "waf-sov-080.tf.any.module-source-version-pinned"
    engine: "terraform"
    provider: "any"
    automated: true
    severity: "high"
    title: "Terraform module sources must reference a pinned version"
    description: >
      Terraform modules sourced from the Terraform Registry must specify a 'version'
      attribute. Git-sourced modules must reference a specific tag or commit hash,
      not a branch reference.
    scope:
      block_type: "module"
    assertions:
      - attribute: "version"
        op: "attribute_exists_if"
        condition: "source_starts_with_registry"
        message: "Registry module must specify a pinned 'version'."
      - attribute: "source"
        op: "not_matches"
        pattern: "\\?ref=main|\\?ref=master|\\?ref=develop"
        message: "Git module source must reference a specific tag or commit hash, not a branch."
    on_fail: "violation"
    remediation: >
      Pin module versions explicitly. For registry modules: use version = "x.y.z".
      For git modules: use ?ref=v1.2.3 with a semver tag.
    example:
      compliant: |
        module "vpc" {
          source  = "terraform-aws-modules/vpc/aws"
          version = "5.5.3"
        }
        module "internal_module" {
          source = "git::https://git.example.com/modules/vpc.git?ref=v2.1.0"
        }
      non_compliant: |
        module "vpc" {
          source = "terraform-aws-modules/vpc/aws"
          # No version pinned
        }
        module "internal_module" {
          source = "git::https://git.example.com/modules/vpc.git?ref=main"
          # Branch reference – mutable
        }

  - id: "waf-sov-080.tf.any.no-untrusted-registry-modules"
    engine: "terraform"
    provider: "any"
    automated: true
    severity: "high"
    title: "Terraform module sources must use approved registries or internal git"
    description: >
      Module sources must reference the official Terraform Registry (registry.terraform.io),
      an approved internal module registry, or a verified internal git repository.
      Arbitrary public git repositories without version pinning are not permitted.
    scope:
      block_type: "module"
    assertions:
      - attribute: "source"
        op: "not_matches"
        pattern: "^github\\.com/(?!hashicorp/).*\\.git$"
        message: "Module source references an unapproved public GitHub repository without registry validation."
    on_fail: "warning"
    remediation: >
      Migrate to official Terraform Registry modules (registry.terraform.io) or
      publish internal modules to your private registry.

references:
  narrative: "modules/pillar-sovereign/pages/controls.adoc#WAF-SOV-080"
  best_practice: "modules/pillar-sovereign/pages/best-practices/bp-supply-chain.adoc"
  related_controls:
    - "WAF-SOV-060"
    - "WAF-SOV-090"
    - "WAF-SOV-100"
