id: WAF-SEC-090
title: "Policy-as-Code & Compliance Automation"
pillar: "security"
status: "active"
severity: "medium"
category: "policy-as-code"
type: ['automation', 'governance', 'configuration']
tags: ['policy-as-code', 'compliance', 'aws-config', 'opa', 'sentinel', 'automation', 'iac-security']

description: >
  Compliance controls MUST be expressed as machine-readable policies using AWS Config rules,
  Open Policy Agent (OPA) policies, HashiCorp Sentinel, or WAF++ Control definitions.
  AWS Config recorder MUST be enabled with recording of all supported resource types in all
  active regions. A Config delivery channel MUST be configured to deliver configuration
  snapshots and compliance notifications. Policy compliance checks MUST run automatically
  on every infrastructure change via CI/CD pipeline gates. Non-compliant resources MUST
  trigger automated alerts and initiate a documented remediation workflow.

rationale: >
  Manual compliance audits are point-in-time, error-prone, and cannot scale to the pace of
  cloud infrastructure change. Infrastructure as Code enables declarative specification of
  desired state, but does not automatically verify that deployed state matches compliance
  requirements. Policy-as-code makes compliance requirements explicit, version-controlled,
  testable, and enforceable at both pre-deployment (IaC scan) and post-deployment (AWS Config)
  stages. Continuous compliance monitoring converts compliance from an annual audit event into
  a continuous engineering discipline, reducing the cost and risk of compliance gaps.

threat:
  - "Configuration drift from compliant state going undetected between periodic audit cycles"
  - "Infrastructure changes deployed without security review bypassing manual compliance checks"
  - "Compliance evidence gaps discovered only during external audits with insufficient remediation time"
  - "Inconsistent policy enforcement across multiple accounts and regions due to manual review bottlenecks"

regulatory_mapping:
  - framework: "BSI C5:2020"
    controls:
      - "OPS-04 – Compliance monitoring and reporting"
      - "SIM-02 – Security information and event management"
  - framework: "ISO 27001:2022"
    controls:
      - "A.5.36 – Compliance with policies, rules and standards for information security"
      - "A.8.8 – Management of technical vulnerabilities"
  - framework: "EUCS (ENISA)"
    controls:
      - "OPS-01 – Operational security monitoring"
  - framework: "SOC 2"
    controls:
      - "CC7.1 – Infrastructure and software monitoring"
      - "CC7.2 – Evaluation of system changes"

implementation_guidance:
  - "Enable AWS Config in all active regions using aws_config_configuration_recorder with recording enabled for all resource types; create a service-linked role for Config."
  - "Configure an aws_config_delivery_channel pointing to a dedicated S3 bucket in a centralized logging account for configuration snapshots and compliance history."
  - "Deploy managed Config rules for critical controls: restricted-ssh, s3-bucket-public-read-prohibited, rds-storage-encrypted, iam-password-policy, mfa-enabled-for-iam-console-access."
  - "Integrate OPA or Conftest into the CI/CD pipeline to evaluate Terraform plan output against policy rules before apply; fail the pipeline on policy violations."
  - "Use AWS Config Conformance Packs to deploy curated sets of Config rules aligned to CIS AWS Foundations Benchmark or NIST 800-53."
  - "Store all policy-as-code files (WAF++ control YAML, OPA Rego policies, Sentinel policies) in version-controlled repositories with mandatory peer review before merge."
  - "Configure Config remediation using aws_config_remediation_configuration with AWS SSM Automation runbooks for auto-remediatable findings."

maturity_levels:
  level_1:
    description: "Compliance checked manually during periodic audits; no automation"
    criteria:
      - "No AWS Config or equivalent continuous compliance monitoring deployed"
      - "Compliance checked manually during quarterly or annual review cycles"
  level_2:
    description: "AWS Config enabled; managed rules deployed for critical controls"
    criteria:
      - "AWS Config recorder enabled in production account with delivery channel configured"
      - "At least 10 managed Config rules deployed covering IAM, S3, RDS, and network controls"
      - "Config findings reviewed weekly"
  level_3:
    description: "Policy-as-code in CI/CD; Config conformance packs deployed"
    criteria:
      - "IaC security scanner (Checkov, tfsec, or custom WAF++ engine) runs on every PR"
      - "Config conformance packs aligned to regulatory frameworks deployed and monitored"
      - "Non-compliant findings trigger automated tickets with defined SLA"
  level_4:
    description: "Automated remediation; cross-account compliance dashboard"
    criteria:
      - "Auto-remediation configured for at least 50% of non-compliant finding types"
      - "Compliance posture dashboard covering all accounts and regions in real time"
      - "Policy exceptions tracked in a risk register with owner and expiry date"
  level_5:
    description: "Continuous compliance with evidence pipeline and audit-ready reporting"
    criteria:
      - "Compliance evidence automatically collected and linked to control IDs for audit"
      - "Drift from compliant state triggers automated quarantine or rollback"
      - "Policy-as-code repository is the system of record; no manual compliance exceptions"

evidence:
  required:
    - kind: "iac"
      description: "Terraform configuration showing aws_config_configuration_recorder and aws_config_delivery_channel resources with appropriate settings."
    - kind: "config"
      description: "AWS Config compliance dashboard export showing compliance percentage per rule and total non-compliant resources."
  optional:
    - kind: "process"
      description: "CI/CD pipeline configuration showing IaC security scan stage with policy check results and blocking behavior."
    - kind: "governance"
      description: "Policy exception register with documented risk acceptance, owner, compensating controls, and expiry dates."

checks:
  - id: "waf-sec-090.tf.aws.config-recorder-enabled"
    engine: "terraform"
    provider: "aws"
    automated: true
    severity: "medium"
    title: "AWS Config configuration recorder must be enabled for all resource types"
    description: >
      An aws_config_configuration_recorder resource must exist with a recording_group
      block that records all supported resource types. This ensures continuous tracking
      of configuration changes across all AWS resources in the account.
    scope:
      block_type: "resource"
      resource_types:
        - "aws_config_configuration_recorder"
    assertions:
      - attribute: "name"
        op: "attribute_exists"
        message: "AWS Config configuration recorder must have a name attribute defined."
      - attribute: "recording_group"
        op: "attribute_exists"
        message: "AWS Config configuration recorder must have a recording_group block specifying which resources to record."
    on_fail: "violation"
    remediation: >
      Create an aws_config_configuration_recorder resource with a recording_group block
      setting all_supported = true and include_global_resource_types = true.
      Create an IAM role with the AWS managed policy AWSConfigRole and reference it
      via the role_arn attribute.
    example:
      compliant: |
        resource "aws_iam_role" "config" {
          name               = "aws-config-role"
          assume_role_policy = data.aws_iam_policy_document.config_assume.json
        }
        resource "aws_iam_role_policy_attachment" "config" {
          role       = aws_iam_role.config.name
          policy_arn = "arn:aws:iam::aws:policy/service-role/AWS_ConfigRole"
        }
        resource "aws_config_configuration_recorder" "main" {
          name     = "default"
          role_arn = aws_iam_role.config.arn
          recording_group {
            all_supported                 = true
            include_global_resource_types = true
          }
        }
        resource "aws_config_configuration_recorder_status" "main" {
          name       = aws_config_configuration_recorder.main.name
          is_enabled = true
          depends_on = [aws_config_delivery_channel.main]
        }
      non_compliant: |
        # aws_config_configuration_recorder absent from Terraform configuration
        # WAF-SEC-090 violation: AWS Config is not deployed in this account

  - id: "waf-sec-090.tf.aws.config-delivery-channel"
    engine: "terraform"
    provider: "aws"
    automated: true
    severity: "medium"
    title: "AWS Config delivery channel must be configured"
    description: >
      An aws_config_delivery_channel resource must exist pointing to a valid S3 bucket
      for configuration snapshot delivery. This ensures compliance history is persisted
      and available for audit.
    scope:
      block_type: "resource"
      resource_types:
        - "aws_config_delivery_channel"
    assertions:
      - attribute: "name"
        op: "attribute_exists"
        message: "AWS Config delivery channel must have a name attribute."
    on_fail: "violation"
    remediation: >
      Create an aws_config_delivery_channel resource with s3_bucket_name pointing to
      a dedicated logging bucket. Optionally configure sns_topic_arn to receive
      configuration change notifications and compliance state change notifications.
    example:
      compliant: |
        resource "aws_config_delivery_channel" "main" {
          name           = "default"
          s3_bucket_name = aws_s3_bucket.config_logs.bucket
          sns_topic_arn  = aws_sns_topic.config_notifications.arn
          snapshot_delivery_properties {
            delivery_frequency = "TwentyFour_Hours"
          }
          depends_on = [aws_config_configuration_recorder.main]
        }
      non_compliant: |
        # aws_config_delivery_channel resource absent
        # WAF-SEC-090 violation: Config findings not delivered to any persistent destination

references:
  narrative: "modules/pillar-security/pages/controls.adoc#WAF-SEC-090"
  best_practice: "modules/pillar-security/pages/best-practices/bp-policy-as-code.adoc"
  related_controls:
    - "WAF-SEC-080"
    - "WAF-SOV-060"
