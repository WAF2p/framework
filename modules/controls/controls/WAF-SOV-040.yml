id: WAF-SOV-040
title: "Logging & Telemetry Residency Controlled"
pillar: "sovereign"
status: "active"
severity: "high"
category: "observability"
type: ['configuration', 'observability']
tags: ['logging', 'telemetry', 'observability', 'cloudtrail', 'flowlogs', 'data-residency']

description: >
  All observability data—logs, traces, and metrics—MUST be stored in approved sovereign
  regions. Exports to external platforms (SaaS observability, third-party SIEM) MUST be
  explicitly approved, documented, and controlled. Log retention periods MUST be defined
  and enforced. VPC flow logs MUST be enabled to support forensic investigation within
  sovereign infrastructure.

rationale: >
  Logs and telemetry frequently contain sensitive operational data, IP addresses,
  request payloads, user identifiers, and timing patterns. A SIEM agent or log shipper
  configured to send to a non-sovereign endpoint silently exports this data outside
  jurisdictional boundaries. CloudTrail and audit logs specifically may contain
  information about privileged actions, key usage, and data access patterns—making their
  residency a direct compliance requirement.

threat:
  - "Audit logs exported to US-based SaaS SIEM without legal basis"
  - "CloudTrail logs stored in S3 bucket auto-replicated to non-sovereign region"
  - "Log agent (Datadog, Splunk, Elastic) shipping sensitive telemetry outside jurisdiction"
  - "VPC flow logs disabled, preventing forensic reconstruction during incident"
  - "Log retention set to 0 (never expire) or too short, violating retention requirements"

regulatory_mapping:
  - framework: "GDPR"
    controls:
      - "Art. 32 – Security of processing (including integrity monitoring)"
      - "Art. 44-46 – Transfers to third countries"
      - "Art. 5(1)(e) – Storage limitation"
  - framework: "BSI C5:2020"
    controls:
      - "LOG-01 – Logging"
      - "LOG-02 – Log protection"
      - "OPS-04 – Data management"
  - framework: "EUCS (ENISA)"
    controls:
      - "LOG-01 – Audit logging"
      - "IVS-09 – Network logging"
  - framework: "ISO 27001:2022"
    controls:
      - "A.8.15 – Logging"
      - "A.8.16 – Monitoring activities"

implementation_guidance:
  - "Enable CloudTrail in all regions with a central S3 bucket in an approved region; enable log file validation."
  - "Set CloudWatch log group retention to match your organization's retention policy (minimum 90 days for audit logs)."
  - "Enable VPC flow logs for all VPCs; store in S3 or CloudWatch in approved region."
  - "For third-party observability (Datadog, Splunk, Elastic): obtain explicit DPA, verify data processing region, and document approval."
  - "Use private endpoints or VPN to send telemetry to approved sovereign SIEM/observability platforms."
  - "Tag all log groups with 'data-residency' and 'data-class' consistent with the data they capture."
  - "Implement log shipping allow-list: explicitly configure and monitor all external log destinations."

maturity_levels:
  level_1:
    description: "Basic logging enabled, residency not controlled"
    criteria:
      - "CloudTrail or equivalent audit logging enabled"
      - "Log location not explicitly validated"
  level_2:
    description: "Log residency defined and IaC reflects it"
    criteria:
      - "CloudTrail S3 bucket in approved region"
      - "CloudWatch log groups have explicit retention set"
      - "VPC flow logs enabled for production VPCs"
  level_3:
    description: "All observability pipelines sovereign-controlled"
    criteria:
      - "No unapproved external log export destinations"
      - "Third-party log destinations have DPA and approved-region verification"
      - "Automated checks verify log group locations and retention"
  level_4:
    description: "Continuous monitoring and anomaly detection"
    criteria:
      - "Alerts on new unapproved log export destinations"
      - "Log completeness monitoring (missing log sources detected)"
      - "Regular review of all active log destinations"
  level_5:
    description: "Sovereign observability platform with full evidence chain"
    criteria:
      - "All telemetry processed within sovereign boundaries end-to-end"
      - "Log integrity verification automated"
      - "Forensic reconstruction capability tested quarterly"

evidence:
  required:
    - kind: "iac"
      description: "Terraform configuration for CloudTrail, log groups, VPC flow logs, and retention settings."
    - kind: "config"
      description: "List of all active log destinations (CloudWatch, S3, external) with their regions."
  optional:
    - kind: "logs"
      description: "Sample of log delivery confirmations showing in-region storage."
    - kind: "process"
      description: "Approval records for any external log export destinations."

checks:
  - id: "waf-sov-040.tf.aws.cloudtrail-multi-region"
    engine: "terraform"
    provider: "aws"
    automated: true
    severity: "critical"
    title: "CloudTrail must be multi-region and have log file validation enabled"
    description: >
      AWS CloudTrail must be enabled for all regions (is_multi_region_trail = true)
      and log file validation must be enabled to detect tampering.
    scope:
      block_type: "resource"
      resource_types:
        - "aws_cloudtrail"
    assertions:
      - attribute: "is_multi_region_trail"
        op: "is_true"
        message: "CloudTrail must be multi-region to capture events from all regions."
      - attribute: "enable_log_file_validation"
        op: "is_true"
        message: "CloudTrail log file validation must be enabled to detect tampering."
    on_fail: "violation"
    remediation: >
      Set is_multi_region_trail = true and enable_log_file_validation = true on all CloudTrail resources.
    example:
      compliant: |
        resource "aws_cloudtrail" "sovereign" {
          name                          = "sovereign-audit-trail"
          s3_bucket_name                = aws_s3_bucket.cloudtrail.id
          is_multi_region_trail         = true
          enable_log_file_validation    = true
          include_global_service_events = true
        }
      non_compliant: |
        resource "aws_cloudtrail" "trail" {
          name           = "my-trail"
          s3_bucket_name = "my-logs"
          # is_multi_region_trail defaults to false
          # enable_log_file_validation defaults to false
        }

  - id: "waf-sov-040.tf.aws.cloudwatch-log-group-retention"
    engine: "terraform"
    provider: "aws"
    automated: true
    severity: "high"
    title: "CloudWatch log groups must have retention period set"
    description: >
      CloudWatch log groups must have an explicit retention_in_days value set.
      A value of 0 means logs never expire and violates data minimization requirements.
      Minimum 90 days for audit/security logs; 30 days for operational logs.
    scope:
      block_type: "resource"
      resource_types:
        - "aws_cloudwatch_log_group"
    assertions:
      - attribute: "retention_in_days"
        op: "attribute_exists"
        message: "CloudWatch log group is missing 'retention_in_days' attribute."
      - attribute: "retention_in_days"
        op: "not_equals"
        expected: 0
        message: "CloudWatch log group retention_in_days must not be 0 (never expire)."
      - attribute: "retention_in_days"
        op: "greater_than_or_equal"
        expected: 30
        message: "Log group retention must be at least 30 days."
    on_fail: "violation"
    remediation: >
      Set retention_in_days on all CloudWatch log groups. Use 90 days minimum
      for audit and security logs, 30 days minimum for application logs.
    example:
      compliant: |
        resource "aws_cloudwatch_log_group" "audit" {
          name              = "/sovereign/audit"
          retention_in_days = 365
          kms_key_id        = aws_kms_key.log_encryption.arn
          tags = {
            data-class     = "audit"
            data-residency = "eu-only"
          }
        }
      non_compliant: |
        resource "aws_cloudwatch_log_group" "app" {
          name = "/app/logs"
          # retention_in_days not set – logs never expire
        }

  - id: "waf-sov-040.tf.aws.vpc-flow-logs-enabled"
    engine: "terraform"
    provider: "aws"
    automated: true
    severity: "high"
    title: "VPC flow logs must be enabled for all VPCs"
    description: >
      Every aws_vpc resource should have a corresponding aws_flow_log resource
      to enable network-level forensics within the sovereign environment.
    scope:
      block_type: "resource"
      resource_types:
        - "aws_vpc"
    assertions:
      - attribute: "id"
        op: "has_associated_resource"
        associated_resource_type: "aws_flow_log"
        associated_attribute: "vpc_id"
        message: "VPC does not have flow logging enabled. Add an aws_flow_log resource."
    on_fail: "violation"
    remediation: >
      Create an aws_flow_log resource referencing each VPC to capture network traffic
      metadata for forensic investigation.
    example:
      compliant: |
        resource "aws_vpc" "main" {
          cidr_block = "10.0.0.0/16"
        }
        resource "aws_flow_log" "main" {
          vpc_id          = aws_vpc.main.id
          traffic_type    = "ALL"
          iam_role_arn    = aws_iam_role.flow_log.arn
          log_destination = aws_cloudwatch_log_group.flow_log.arn
        }
      non_compliant: |
        resource "aws_vpc" "main" {
          cidr_block = "10.0.0.0/16"
          # No flow log configured
        }

  - id: "waf-sov-040.tf.aws.cloudtrail-cloudwatch-integration"
    engine: "terraform"
    provider: "aws"
    automated: true
    severity: "medium"
    title: "CloudTrail should integrate with CloudWatch for real-time monitoring"
    description: >
      CloudTrail should have cloud_watch_logs_group_arn set to enable real-time
      monitoring and alerting on privileged actions and anomalous activity.
    scope:
      block_type: "resource"
      resource_types:
        - "aws_cloudtrail"
    assertions:
      - attribute: "cloud_watch_logs_group_arn"
        op: "attribute_exists"
        message: "CloudTrail should have cloud_watch_logs_group_arn configured for real-time monitoring."
      - attribute: "cloud_watch_logs_role_arn"
        op: "attribute_exists"
        message: "CloudTrail requires cloud_watch_logs_role_arn when CloudWatch integration is used."
    on_fail: "warning"
    remediation: >
      Set cloud_watch_logs_group_arn and cloud_watch_logs_role_arn on the CloudTrail resource
      to enable real-time detection of privileged and anomalous activities.

  - id: "waf-sov-040.tf.aws.log-group-kms-encryption"
    engine: "terraform"
    provider: "aws"
    automated: true
    severity: "medium"
    title: "CloudWatch log groups containing audit data should use KMS encryption"
    description: >
      CloudWatch log groups that capture audit, security, or administrative events
      should have kms_key_id set to a CMK to ensure encryption with customer-managed keys.
    scope:
      block_type: "resource"
      resource_types:
        - "aws_cloudwatch_log_group"
      name_pattern: "(audit|security|cloudtrail|flow|admin)"
    assertions:
      - attribute: "kms_key_id"
        op: "attribute_exists"
        message: "Audit/security log group should be encrypted with a customer-managed KMS key."
    on_fail: "warning"
    remediation: >
      Add kms_key_id referencing a CMK to log groups capturing sensitive audit data.

references:
  narrative: "modules/pillar-sovereign/pages/controls.adoc#WAF-SOV-040"
  best_practice: "modules/pillar-sovereign/pages/best-practices/bp-data-residency.adoc"
  related_controls:
    - "WAF-SOV-010"
    - "WAF-SOV-050"
    - "WAF-SOV-060"
    - "WAF-SOV-070"
    - "WAF-SOV-090"
