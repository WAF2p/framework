id: WAF-SOV-070
title: "Break-Glass Process & Logging"
pillar: "sovereign"
status: "active"
severity: "high"
category: "access-control"
type: ['security', 'operations']
tags: ['break-glass', 'incident', 'logging', 'cloudtrail', 'root-access', 'emergency-access']

description: >
  A formally documented break-glass procedure MUST exist defining trigger criteria,
  approval workflow, activation steps, and post-incident review requirements.
  All break-glass actions MUST be fully logged via CloudTrail (or equivalent) with
  log file validation enabled. Root account and emergency admin activities MUST trigger
  real-time alerts. Post-incident reviews MUST be documented and linked to the activation event.

rationale: >
  Break-glass access represents the highest-risk event in a cloud environment: emergency
  use of highly privileged credentials that bypass normal access controls. Without a
  defined process, logging, and review cycle, break-glass becomes a permanent backdoor.
  From a sovereignty perspective, unlogged privileged access can modify region constraints,
  disable audit logging, alter key policies, or exfiltrate data—effectively defeating
  the entire sovereignty posture in a single incident.

threat:
  - "Emergency access used as persistent backdoor without post-incident decommissioning"
  - "Root account credentials used for routine tasks without logging or review"
  - "Break-glass activation with no audit trail, enabling plausible deniability"
  - "Compromised emergency credentials not rotated after incident closure"
  - "Disabled CloudTrail during 'maintenance' preventing forensic reconstruction"

regulatory_mapping:
  - framework: "GDPR"
    controls:
      - "Art. 32 – Security of processing"
      - "Art. 33 – Notification of personal data breach"
  - framework: "BSI C5:2020"
    controls:
      - "IAM-03 – Privileged access management"
      - "LOG-01 – Logging"
      - "BCM-02 – Incident management"
  - framework: "EUCS (ENISA)"
    controls:
      - "IAM-03 – Emergency access"
      - "LOG-01 – Audit logging"
  - framework: "ISO 27001:2022"
    controls:
      - "A.5.26 – Response to information security incidents"
      - "A.8.15 – Logging"
      - "A.8.16 – Monitoring activities"
  - framework: "SOC 2"
    controls:
      - "CC7.4 – Security incident response"

implementation_guidance:
  - "Document the break-glass runbook: trigger criteria, who can activate, approval chain, step-by-step procedure."
  - "Store break-glass credentials in a dedicated, independently audited secret store (not the main vault)."
  - "Enable CloudTrail in all regions with is_multi_region_trail = true and log file validation."
  - "Create CloudWatch metric filters and alarms for: root account API calls, Console sign-in without MFA, IAM policy changes."
  - "Rotate break-glass credentials immediately after each use; do not use them for routine tasks."
  - "Conduct a post-incident review within 5 business days of each break-glass activation."
  - "Store post-incident review records linked to the CloudTrail event IDs of the activation."
  - "Test the break-glass process in a non-production environment at least annually."

maturity_levels:
  level_1:
    description: "Break-glass exists but is undocumented"
    criteria:
      - "Emergency access credentials exist"
      - "No formal process documented"
  level_2:
    description: "Process documented, basic logging"
    criteria:
      - "Break-glass runbook exists and is version-controlled"
      - "CloudTrail enabled for the account"
  level_3:
    description: "Full logging, alerts, and post-incident review"
    criteria:
      - "CloudTrail multi-region with log file validation"
      - "Real-time alerts on root/break-glass activation"
      - "Post-incident review mandatory and documented"
  level_4:
    description: "Automated detection and credential rotation"
    criteria:
      - "Automated credential rotation after each use"
      - "Break-glass activations trigger change management ticket automatically"
      - "Annual non-production break-glass drill completed"
  level_5:
    description: "Zero-standing-privilege with just-in-time break-glass"
    criteria:
      - "No standing break-glass credentials; activated on demand with dual approval"
      - "Full forensic evidence chain automated"
      - "Mean time to break-glass activation < 5 minutes, audit artifact generated"

evidence:
  required:
    - kind: "process"
      description: "Break-glass runbook (version-controlled, covering trigger, approval, activation, decommission, review)."
    - kind: "iac"
      description: "CloudTrail resources with is_multi_region_trail=true and enable_log_file_validation=true."
    - kind: "iac"
      description: "CloudWatch metric filters and alarms for root account activity."
  optional:
    - kind: "logs"
      description: "Example post-incident review record from last break-glass test or activation."
    - kind: "config"
      description: "Secret store configuration for break-glass credential storage."

checks:
  - id: "waf-sov-070.tf.aws.cloudtrail-enabled-all-regions"
    engine: "terraform"
    provider: "aws"
    automated: true
    severity: "critical"
    title: "CloudTrail must be multi-region with log file validation"
    description: >
      At least one CloudTrail must be configured with is_multi_region_trail = true
      and enable_log_file_validation = true to capture all API activity and
      detect log tampering.
    scope:
      block_type: "resource"
      resource_types:
        - "aws_cloudtrail"
    assertions:
      - attribute: "is_multi_region_trail"
        op: "is_true"
        message: "CloudTrail must be multi-region to capture break-glass events from all regions."
      - attribute: "enable_log_file_validation"
        op: "is_true"
        message: "CloudTrail log file validation must be enabled to detect tampering."
      - attribute: "include_global_service_events"
        op: "is_true"
        message: "CloudTrail must include global service events (IAM, STS, etc.)."
    on_fail: "violation"
    remediation: >
      Set is_multi_region_trail = true, enable_log_file_validation = true, and
      include_global_service_events = true on CloudTrail.
    example:
      compliant: |
        resource "aws_cloudtrail" "sovereign" {
          name                          = "sovereign-audit-trail"
          s3_bucket_name                = aws_s3_bucket.cloudtrail.id
          is_multi_region_trail         = true
          enable_log_file_validation    = true
          include_global_service_events = true
          cloud_watch_logs_group_arn    = "${aws_cloudwatch_log_group.cloudtrail.arn}:*"
          cloud_watch_logs_role_arn     = aws_iam_role.cloudtrail_cw.arn
        }
      non_compliant: |
        resource "aws_cloudtrail" "trail" {
          name           = "my-trail"
          s3_bucket_name = "my-logs"
          # Defaults: single region, no validation, no CloudWatch
        }

  - id: "waf-sov-070.tf.aws.cloudtrail-s3-bucket-not-public"
    engine: "terraform"
    provider: "aws"
    automated: true
    severity: "critical"
    title: "CloudTrail S3 bucket must not be publicly accessible"
    description: >
      The S3 bucket storing CloudTrail logs must have public access blocked.
      Public CloudTrail logs expose the full API activity of the account.
    scope:
      block_type: "resource"
      resource_types:
        - "aws_s3_bucket_public_access_block"
    assertions:
      - attribute: "block_public_acls"
        op: "is_true"
        message: "CloudTrail S3 bucket must block public ACLs."
      - attribute: "block_public_policy"
        op: "is_true"
        message: "CloudTrail S3 bucket must block public bucket policy."
      - attribute: "ignore_public_acls"
        op: "is_true"
        message: "CloudTrail S3 bucket must ignore public ACLs."
      - attribute: "restrict_public_buckets"
        op: "is_true"
        message: "CloudTrail S3 bucket must restrict public buckets."
    on_fail: "violation"
    remediation: >
      Create an aws_s3_bucket_public_access_block resource for the CloudTrail bucket
      with all four settings set to true.
    example:
      compliant: |
        resource "aws_s3_bucket_public_access_block" "cloudtrail" {
          bucket                  = aws_s3_bucket.cloudtrail.id
          block_public_acls       = true
          block_public_policy     = true
          ignore_public_acls      = true
          restrict_public_buckets = true
        }
      non_compliant: |
        resource "aws_s3_bucket_public_access_block" "cloudtrail" {
          bucket            = aws_s3_bucket.cloudtrail.id
          block_public_acls = true
          # Other settings missing – defaults to false
        }

  - id: "waf-sov-070.tf.aws.cloudwatch-alarm-root-login"
    engine: "terraform"
    provider: "aws"
    automated: true
    severity: "critical"
    title: "CloudWatch alarm must exist for root account sign-in"
    description: >
      A CloudWatch metric filter and alarm must be configured to detect and alert
      on any root account API call or console sign-in. Root usage outside a
      documented break-glass process is a critical sovereignty violation.
    scope:
      block_type: "resource"
      resource_types:
        - "aws_cloudwatch_metric_alarm"
    assertions:
      - attribute: "metric_name"
        op: "has_associated_metric_filter"
        filter_pattern: "{$.userIdentity.type = Root}"
        message: "No CloudWatch alarm found monitoring root account activity."
    on_fail: "violation"
    remediation: >
      Create a CloudWatch metric filter matching root API calls and an alarm
      that notifies a security SNS topic when the metric is triggered.
    example:
      compliant: |
        resource "aws_cloudwatch_log_metric_filter" "root_usage" {
          name           = "root-account-usage"
          pattern        = "{$.userIdentity.type = Root && $.userIdentity.invokedBy NOT EXISTS && $.eventType != AwsServiceEvent}"
          log_group_name = aws_cloudwatch_log_group.cloudtrail.name
          metric_transformation {
            name      = "RootAccountUsageCount"
            namespace = "CloudTrailMetrics"
            value     = "1"
          }
        }
        resource "aws_cloudwatch_metric_alarm" "root_usage" {
          alarm_name          = "root-account-usage"
          comparison_operator = "GreaterThanOrEqualToThreshold"
          evaluation_periods  = "1"
          metric_name         = "RootAccountUsageCount"
          namespace           = "CloudTrailMetrics"
          period              = "60"
          statistic           = "Sum"
          threshold           = "1"
          alarm_actions       = [aws_sns_topic.security_alerts.arn]
        }
      non_compliant: |
        # No metric filter or alarm for root account activity

  - id: "waf-sov-070.tf.aws.cloudwatch-alarm-iam-policy-changes"
    engine: "terraform"
    provider: "aws"
    automated: true
    severity: "high"
    title: "CloudWatch alarm must exist for IAM policy changes"
    description: >
      Unauthorized IAM policy changes can escalate privileges or disable sovereignty
      controls. An alarm must detect and alert on IAM policy creation, modification,
      or deletion events.
    scope:
      block_type: "resource"
      resource_types:
        - "aws_cloudwatch_log_metric_filter"
    assertions:
      - attribute: "pattern"
        op: "matches"
        pattern: "CreatePolicy|DeletePolicy|AttachRolePolicy|DetachRolePolicy"
        message: "No CloudWatch metric filter found monitoring IAM policy changes."
    on_fail: "warning"
    remediation: >
      Create metric filters for IAM policy changes (CreatePolicy, DeletePolicy,
      AttachRolePolicy, DetachRolePolicy) with associated CloudWatch alarms.

  - id: "waf-sov-070.tf.aws.cloudtrail-s3-access-logging"
    engine: "terraform"
    provider: "aws"
    automated: true
    severity: "medium"
    title: "CloudTrail S3 bucket should have server access logging enabled"
    description: >
      The S3 bucket storing CloudTrail logs should have access logging enabled
      to detect unauthorized access attempts to the audit logs themselves.
    scope:
      block_type: "resource"
      resource_types:
        - "aws_s3_bucket_logging"
    assertions:
      - attribute: "bucket"
        op: "references_cloudtrail_bucket"
        message: "CloudTrail S3 bucket should have an aws_s3_bucket_logging resource configured."
    on_fail: "warning"
    remediation: >
      Create an aws_s3_bucket_logging resource for the CloudTrail bucket targeting
      a separate access logs bucket.

references:
  narrative: "modules/pillar-sovereign/pages/controls.adoc#WAF-SOV-070"
  best_practice: "modules/pillar-sovereign/pages/best-practices/bp-break-glass.adoc"
  related_controls:
    - "WAF-SOV-040"
    - "WAF-SOV-050"
    - "WAF-SOV-060"
